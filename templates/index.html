<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Devoirs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">📚</span>
      <span class="brand-text">Mes Devoirs</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#/" class="nav-item" data-route="/">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Accueil</span>
      </a>
      <a href="#/classes" class="nav-item" data-route="/classes">
        <span class="nav-icon">🎓</span>
        <span class="nav-label">Classes</span>
      </a>
      <a href="#/devoirs" class="nav-item" data-route="/devoirs">
        <span class="nav-icon">📝</span>
        <span class="nav-label">Devoirs</span>
      </a>
      <a href="#/projection" class="nav-item" data-route="/projection">
        <span class="nav-icon">🖥️</span>
        <span class="nav-label">Projection</span>
      </a>
      <a href="#/parametres" class="nav-item" data-route="/parametres">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Paramètres</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <a id="ent-link" href="#" target="_blank" class="ent-link-sidebar hidden">
        <span class="nav-icon">🌐</span>
        <span id="ent-link-text" class="nav-label">ENT</span>
      </a>
      <button id="sidebar-toggle" class="sidebar-toggle-btn" title="Réduire le menu">
        <svg class="toggle-icon-collapse" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        <svg class="toggle-icon-expand" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="nav-label">Réduire</span>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <div id="layout">
    <main id="app-content">
      <!-- Dynamic content injected here -->
    </main>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Modal container -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box">
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
    (function() {
      const sidebar = document.getElementById('sidebar');
      const layout = document.getElementById('layout');
      const btn = document.getElementById('sidebar-toggle');
      const STORAGE_KEY = 'sidebar-mode';

      function setMode(reduced) {
        if (reduced) {
          sidebar.classList.add('sidebar-reduced');
          layout.classList.add('layout-reduced');
          btn.title = 'Déployer le menu';
        } else {
          sidebar.classList.remove('sidebar-reduced');
          layout.classList.remove('layout-reduced');
          btn.title = 'Réduire le menu';
        }
        localStorage.setItem(STORAGE_KEY, reduced ? 'reduced' : 'expanded');
      }

      // Restore saved mode
      setMode(localStorage.getItem(STORAGE_KEY) === 'reduced');

      btn.addEventListener('click', () => {
        setMode(!sidebar.classList.contains('sidebar-reduced'));
      });
    })();
  </script>
  <script src="/static/js/app.js"></script>
  <script src="/static/js/classes.js"></script>
  <script src="/static/js/devoirs.js"></script>
  <script src="/static/js/projection.js"></script>
  <script src="/static/js/parametres.js"></script>
</body>
</html>
